<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1826"/>
      <stop offset="100%" stop-color="#081220"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#22d4ff"/>
      <stop offset="100%" stop-color="#0070c0"/>
    </linearGradient>
    <linearGradient id="shaftGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004a99"/>
      <stop offset="50%" stop-color="#0090d0"/>
      <stop offset="100%" stop-color="#40c8f0"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="30%" y1="80%" x2="85%" y2="10%">
      <stop offset="0%" stop-color="#0078b8"/>
      <stop offset="55%" stop-color="#22bbee"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- C shape: thick arc, opening upper-right -->
  <circle cx="238" cy="256" r="143"
    fill="none"
    stroke="url(#cGrad)"
    stroke-width="50"
    stroke-linecap="butt"
    stroke-dasharray="676 222"
    transform="rotate(125 238 256)"/>

  <!-- Circuit decorations (inner C, upper-left area) -->
  <!-- Upper cluster -->
  <line x1="190" y1="172" x2="152" y2="172" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="152" y1="172" x2="152" y2="150" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="152" cy="150" r="5.5" fill="#ffffff"/>

  <line x1="176" y1="158" x2="140" y2="158" stroke="#22aadd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="158" r="4" fill="#33bbee"/>

  <!-- Left cluster -->
  <line x1="118" y1="240" x2="88" y2="240" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="88" y1="240" x2="88" y2="265" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="88" cy="240" r="5.5" fill="#ffffff"/>
  <circle cx="88" cy="265" r="4" fill="#0099cc"/>

  <!-- Lower cluster -->
  <line x1="178" y1="354" x2="144" y2="354" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="144" y1="354" x2="144" y2="378" stroke="#22aadd" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="144" cy="354" r="5.5" fill="#ffffff"/>
  <circle cx="144" cy="378" r="4" fill="#0099cc"/>

  <!-- Bottom branch -->
  <line x1="220" y1="384" x2="220" y2="406" stroke="#22aadd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="220" cy="406" r="4.5" fill="#0099cc"/>

  <!-- Mid-left branch -->
  <line x1="236" y1="292" x2="206" y2="292" stroke="#22aadd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="206" cy="292" r="4" fill="#0099cc"/>

  <!-- Stock chart arrow shaft (zigzag, lower-left → upper-right) -->
  <polyline
    points="165,392 202,352 228,367 266,320 292,335 332,280 351,159"
    fill="none"
    stroke="url(#shaftGrad)"
    stroke-width="17"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Arrowhead (tip upper-right ~45°) -->
  <!-- Tip:(415,95) Back-right:(376,183) Back-notch:(351,159) Back-left:(326,134) -->
  <polygon
    points="415,95 376,183 351,159 326,134"
    fill="url(#headGrad)"/>

  <!-- White gleam highlight on arrowhead -->
  <line x1="370" y1="190" x2="415" y2="95"
    stroke="white"
    stroke-width="9"
    stroke-linecap="round"
    stroke-opacity="0.5"/>
</svg>

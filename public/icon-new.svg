<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <linearGradient id="cColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="arrowColor" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- C（円弧ストロークで作る・太く・丸端） -->
  <circle
    cx="256" cy="256" r="148"
    fill="none"
    stroke="url(#cColor)"
    stroke-width="72"
    stroke-linecap="round"
    stroke-dasharray="700 230"
    transform="rotate(125 256 256)"
  />

  <!-- 上昇矢印（C の開口部を突き抜ける） -->
  <!-- 矢印の軸 -->
  <line
    x1="310" y1="360"
    x2="390" y2="148"
    stroke="url(#arrowColor)"
    stroke-width="34"
    stroke-linecap="round"
  />
  <!-- 矢印の頭 -->
  <polygon
    points="390,148 348,158 380,196"
    fill="white"
  />

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0f2035"/>
      <stop offset="100%" stop-color="#081220"/>
    </radialGradient>
    <linearGradient id="cArcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="40%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="70%" stop-color="#7fffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="arrowHeadGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60efff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="arrowGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#1a3a5c" stroke-width="2" opacity="0.5"/>

  <g clip-path="url(#roundedClip)">

    <!-- 回路基板装飾（水平線） -->
    <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.85">
      <line x1="92" y1="148" x2="190" y2="148"/>
      <line x1="92" y1="172" x2="165" y2="172"/>
      <line x1="108" y1="196" x2="185" y2="196"/>
      <line x1="80" y1="220" x2="210" y2="220"/>
      <line x1="80" y1="244" x2="195" y2="244"/>
      <line x1="78" y1="268" x2="205" y2="268"/>
      <line x1="80" y1="292" x2="195" y2="292"/>
      <line x1="80" y1="316" x2="210" y2="316"/>
      <line x1="92" y1="340" x2="185" y2="340"/>
      <line x1="108" y1="364" x2="182" y2="364"/>
      <line x1="92" y1="384" x2="165" y2="384"/>
      <line x1="100" y1="404" x2="190" y2="404"/>
    </g>

    <!-- 回路基板装飾（垂直線） -->
    <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.85">
      <line x1="115" y1="148" x2="115" y2="172"/>
      <line x1="148" y1="148" x2="148" y2="196"/>
      <line x1="172" y1="172" x2="172" y2="220"/>
      <line x1="95"  y1="220" x2="95"  y2="268"/>
      <line x1="130" y1="220" x2="130" y2="244"/>
      <line x1="175" y1="244" x2="175" y2="268"/>
      <line x1="95"  y1="292" x2="95"  y2="340"/>
      <line x1="155" y1="268" x2="155" y2="292"/>
      <line x1="180" y1="316" x2="180" y2="340"/>
      <line x1="120" y1="340" x2="120" y2="384"/>
      <line x1="155" y1="364" x2="155" y2="404"/>
      <line x1="175" y1="384" x2="175" y2="404"/>
    </g>

    <!-- 白いノード -->
    <g fill="#ffffff" filter="url(#nodeGlow)">
      <circle cx="115" cy="148" r="3.5" opacity="0.95"/>
      <circle cx="148" cy="148" r="3"   opacity="0.9"/>
      <circle cx="172" cy="172" r="3.5" opacity="0.95"/>
      <circle cx="190" cy="148" r="2.5" opacity="0.8"/>
      <circle cx="165" cy="172" r="2.5" opacity="0.8"/>
      <circle cx="185" cy="196" r="3"   opacity="0.9"/>
      <circle cx="95"  cy="220" r="3.5" opacity="0.95"/>
      <circle cx="130" cy="220" r="3"   opacity="0.9"/>
      <circle cx="175" cy="220" r="2.5" opacity="0.8"/>
      <circle cx="210" cy="220" r="2.5" opacity="0.8"/>
      <circle cx="130" cy="244" r="3.5" opacity="0.95"/>
      <circle cx="175" cy="268" r="3"   opacity="0.9"/>
      <circle cx="155" cy="268" r="2.5" opacity="0.8"/>
      <circle cx="95"  cy="268" r="3.5" opacity="0.95"/>
      <circle cx="95"  cy="292" r="3.5" opacity="0.95"/>
      <circle cx="155" cy="292" r="3"   opacity="0.9"/>
      <circle cx="195" cy="292" r="2.5" opacity="0.8"/>
      <circle cx="180" cy="316" r="3.5" opacity="0.95"/>
      <circle cx="95"  cy="340" r="3"   opacity="0.9"/>
      <circle cx="120" cy="340" r="2.5" opacity="0.8"/>
      <circle cx="180" cy="340" r="3.5" opacity="0.95"/>
      <circle cx="120" cy="384" r="3.5" opacity="0.95"/>
      <circle cx="155" cy="364" r="3"   opacity="0.9"/>
      <circle cx="155" cy="404" r="2.5" opacity="0.8"/>
      <circle cx="175" cy="384" r="3.5" opacity="0.95"/>
      <circle cx="175" cy="404" r="3"   opacity="0.9"/>
    </g>

    <!-- シアンノード（アクセント） -->
    <g fill="#00e5ff" filter="url(#nodeGlow)">
      <circle cx="148" cy="196" r="3"   opacity="0.9"/>
      <circle cx="108" cy="220" r="2.5" opacity="0.85"/>
      <circle cx="205" cy="268" r="2.5" opacity="0.85"/>
      <circle cx="210" cy="316" r="3"   opacity="0.9"/>
      <circle cx="108" cy="364" r="2.5" opacity="0.85"/>
      <circle cx="190" cy="404" r="3"   opacity="0.9"/>
    </g>

    <!-- C アーク（グロー） -->
    <path d="M 362,148 A 142,142 0 1,0 362,418"
          fill="none" stroke="#00cfff" stroke-width="46"
          stroke-linecap="round" opacity="0.18" filter="url(#arcGlow)"/>

    <!-- C アーク（メイン） -->
    <path d="M 362,148 A 142,142 0 1,0 362,418"
          fill="none" stroke="url(#cArcGrad)" stroke-width="38"
          stroke-linecap="round" filter="url(#arcGlow)"/>

    <!-- C アーク内側ハイライト -->
    <path d="M 362,148 A 142,142 0 1,0 362,418"
          fill="none" stroke="#ffffff" stroke-width="2.5"
          stroke-linecap="round" opacity="0.2"/>

    <!-- 矢印軸（グロー） -->
    <polyline points="148,370 195,340 230,355 275,315 310,330 348,295 388,310 420,282"
      fill="none" stroke="#00cfff" stroke-width="12"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#arrowGlow)"/>

    <!-- 矢印軸（メイン・ジグザグ） -->
    <polyline points="148,370 195,340 230,355 275,315 310,330 348,295 388,310 420,282"
      fill="none" stroke="url(#arrowGrad)" stroke-width="5.5"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#arrowGlow)"/>

    <!-- 矢印頭 -->
    <polygon points="420,282 397,268 415,255 442,272"
      fill="url(#arrowHeadGrad)" filter="url(#arrowGlow)"/>

    <!-- 矢印グレア -->
    <polyline points="148,370 195,340 230,355 275,315 310,330 348,295 388,310 420,282"
      fill="none" stroke="#ffffff" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

    <!-- 矢印頭グレア -->
    <line x1="410" y1="258" x2="435" y2="270"
      stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="432" cy="268" r="4.5" fill="#ffffff" opacity="0.85" filter="url(#nodeGlow)"/>

  </g>
</svg>

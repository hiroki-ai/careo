<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#3b4f6b"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff5ef"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="65%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#00e8b8"/>
      <stop offset="100%" stop-color="#009e76"/>
    </linearGradient>
    <linearGradient id="beakG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <ellipse cx="160" cy="374" rx="80" ry="10" fill="rgba(0,0,0,0.10)"/>

  <!-- Body -->
  <ellipse cx="160" cy="258" rx="90" ry="100" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="270" rx="57" ry="78" fill="url(#bellyG)"/>

  <!-- Wings (relaxed) -->
  <ellipse cx="74" cy="255" rx="26" ry="72" fill="url(#bodyG)" transform="rotate(-10,74,255)"/>
  <ellipse cx="246" cy="255" rx="26" ry="72" fill="url(#bodyG)" transform="rotate(10,246,255)"/>

  <!-- Feet -->
  <ellipse cx="130" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(-22,130,352)"/>
  <ellipse cx="190" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(22,190,352)"/>

  <!-- Tie -->
  <path d="M152,187 L160,174 L168,187 L160,185Z" fill="#007f5e"/>
  <path d="M153,187 L167,187 L163,232 L160,238 L157,232Z" fill="url(#tieG)"/>

  <!-- Head -->
  <circle cx="160" cy="135" r="84" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="146" rx="56" ry="53" fill="url(#bellyG)"/>

  <!-- Eyes (looking up and to the right) -->
  <circle cx="140" cy="128" r="20" fill="white"/>
  <circle cx="180" cy="128" r="20" fill="white"/>
  <!-- Irises shifted up-right -->
  <circle cx="147" cy="122" r="12" fill="url(#eyeG)"/>
  <circle cx="187" cy="122" r="12" fill="url(#eyeG)"/>
  <circle cx="149" cy="121" r="7" fill="#020617"/>
  <circle cx="189" cy="121" r="7" fill="#020617"/>
  <!-- Sparkles -->
  <circle cx="153" cy="117" r="4" fill="white"/>
  <circle cx="193" cy="117" r="4" fill="white"/>

  <!-- Eyelashes -->
  <path d="M124,115 Q126,108 132,111" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M155,112 Q158,105 164,108" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M166,112 Q170,105 176,108" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M194,115 Q198,108 202,111" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Beak (curious, slightly open) -->
  <path d="M146,160 Q160,170 174,160 Q160,151 146,160Z" fill="url(#beakG)"/>
  <path d="M152,160 Q160,163 168,160" stroke="#b45309" stroke-width="1.3" fill="none"/>

  <!-- Cheeks -->
  <ellipse cx="116" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.22)"/>
  <ellipse cx="204" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.22)"/>

  <!-- Thought bubble dots -->
  <circle cx="230" cy="75" r="5" fill="rgba(0,0,0,0.1)"/>
  <circle cx="248" cy="55" r="7" fill="rgba(0,0,0,0.1)"/>
  <circle cx="270" cy="35" r="10" fill="rgba(0,0,0,0.1)"/>
</svg>

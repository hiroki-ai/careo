<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#3b4f6b"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff5ef"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="65%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#00e8b8"/>
      <stop offset="100%" stop-color="#009e76"/>
    </linearGradient>
    <linearGradient id="beakG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="160" cy="374" rx="80" ry="10" fill="rgba(0,0,0,0.10)"/>

  <!-- Body -->
  <ellipse cx="160" cy="258" rx="90" ry="100" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="133" cy="212" rx="28" ry="20" fill="rgba(255,255,255,0.05)" transform="rotate(-15,133,212)"/>

  <!-- White belly -->
  <ellipse cx="160" cy="270" rx="57" ry="78" fill="url(#bellyG)"/>

  <!-- Left wing -->
  <ellipse cx="74" cy="250" rx="26" ry="72" fill="url(#bodyG)" transform="rotate(-15,74,250)"/>
  <ellipse cx="70" cy="224" rx="9" ry="25" fill="rgba(255,255,255,0.06)" transform="rotate(-15,70,224)"/>

  <!-- Right wing -->
  <ellipse cx="246" cy="250" rx="26" ry="72" fill="url(#bodyG)" transform="rotate(15,246,250)"/>
  <ellipse cx="250" cy="224" rx="9" ry="25" fill="rgba(255,255,255,0.06)" transform="rotate(15,250,224)"/>

  <!-- Feet -->
  <ellipse cx="130" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(-22,130,352)"/>
  <ellipse cx="190" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(22,190,352)"/>

  <!-- Head -->
  <circle cx="160" cy="135" r="84" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="133" cy="103" rx="27" ry="21" fill="rgba(255,255,255,0.06)"/>

  <!-- White face patch -->
  <ellipse cx="160" cy="146" rx="56" ry="53" fill="url(#bellyG)"/>

  <!-- Eyes -->
  <circle cx="140" cy="128" r="20" fill="white"/>
  <circle cx="180" cy="128" r="20" fill="white"/>
  <circle cx="142" cy="129" r="12" fill="url(#eyeG)"/>
  <circle cx="182" cy="129" r="12" fill="url(#eyeG)"/>
  <circle cx="143" cy="130" r="7" fill="#020617"/>
  <circle cx="183" cy="130" r="7" fill="#020617"/>
  <!-- Sparkles -->
  <circle cx="148" cy="124" r="4.2" fill="white"/>
  <circle cx="188" cy="124" r="4.2" fill="white"/>
  <circle cx="139" cy="134" r="2.2" fill="rgba(255,255,255,0.65)"/>
  <circle cx="179" cy="134" r="2.2" fill="rgba(255,255,255,0.65)"/>

  <!-- Eyelashes -->
  <path d="M124,115 Q126,108 132,111" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M155,112 Q158,105 164,108" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M166,112 Q170,105 176,108" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M194,115 Q198,108 202,111" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Beak -->
  <path d="M146,160 Q160,172 174,160 Q160,150 146,160Z" fill="url(#beakG)"/>
  <path d="M150,160 Q160,165 170,160" stroke="#b45309" stroke-width="1.3" fill="none"/>

  <!-- Cheeks -->
  <ellipse cx="116" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.22)"/>
  <ellipse cx="204" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.22)"/>

  <!-- Tie -->
  <path d="M152,187 L160,174 L168,187 L160,185Z" fill="#007f5e"/>
  <path d="M153,187 L167,187 L163,232 L160,238 L157,232Z" fill="url(#tieG)"/>
  <path d="M159,190 L161,190 L160.5,222 L159.5,222Z" fill="rgba(255,255,255,0.32)"/>

  <!-- Sparkles -->
  <g transform="translate(244,54)" opacity="0.92">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#00c896" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#00c896" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#00c896" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#00c896" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3.5" fill="#00c896"/>
  </g>
  <g transform="translate(55,162)" opacity="0.72">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#00c896" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#00c896" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.2" fill="#00c896"/>
  </g>
</svg>

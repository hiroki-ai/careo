<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#3b4f6b"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff5ef"/>
    </radialGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#00e8b8"/>
      <stop offset="100%" stop-color="#009e76"/>
    </linearGradient>
    <linearGradient id="beakG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <ellipse cx="160" cy="374" rx="80" ry="10" fill="rgba(0,0,0,0.10)"/>

  <!-- Body -->
  <ellipse cx="160" cy="258" rx="90" ry="100" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="270" rx="57" ry="78" fill="url(#bellyG)"/>

  <!-- Left wing (raised high!) -->
  <ellipse cx="58" cy="190" rx="26" ry="68" fill="url(#bodyG)" transform="rotate(-40,58,190)"/>
  <!-- Right wing (raised high!) -->
  <ellipse cx="262" cy="190" rx="26" ry="68" fill="url(#bodyG)" transform="rotate(40,262,190)"/>

  <!-- Feet -->
  <ellipse cx="130" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(-22,130,352)"/>
  <ellipse cx="190" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(22,190,352)"/>

  <!-- Tie -->
  <path d="M152,187 L160,174 L168,187 L160,185Z" fill="#007f5e"/>
  <path d="M153,187 L167,187 L163,232 L160,238 L157,232Z" fill="url(#tieG)"/>

  <!-- Head -->
  <circle cx="160" cy="135" r="84" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="146" rx="56" ry="53" fill="url(#bellyG)"/>

  <!-- Eyes (squeezed shut with joy - happy arcs) -->
  <path d="M125,128 Q140,118 155,128" stroke="#0d1b2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M165,128 Q180,118 195,128" stroke="#0d1b2e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Beak (open smile) -->
  <path d="M142,155 Q160,178 178,155 Q160,148 142,155Z" fill="url(#beakG)"/>
  <path d="M148,160 Q160,170 172,160" stroke="#b45309" stroke-width="1.5" fill="none"/>
  <!-- Open mouth -->
  <ellipse cx="160" cy="166" rx="12" ry="8" fill="#c2410c" opacity="0.3"/>

  <!-- Cheeks (bigger, more pink) -->
  <ellipse cx="116" cy="150" rx="20" ry="14" fill="rgba(255,130,130,0.35)"/>
  <ellipse cx="204" cy="150" rx="20" ry="14" fill="rgba(255,130,130,0.35)"/>

  <!-- Confetti sparkles -->
  <g opacity="0.9">
    <!-- Star 1 -->
    <g transform="translate(60,50)">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="7" y1="-7" x2="-7" y2="7" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <!-- Star 2 -->
    <g transform="translate(260,45)">
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#00c896" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#00c896" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3" fill="#00c896"/>
    </g>
    <!-- Confetti pieces -->
    <rect x="40" y="90" width="6" height="3" rx="1" fill="#fb7185" transform="rotate(25,43,91)"/>
    <rect x="280" y="80" width="6" height="3" rx="1" fill="#a78bfa" transform="rotate(-15,283,81)"/>
    <rect x="90" y="35" width="5" height="3" rx="1" fill="#00c896" transform="rotate(45,92,36)"/>
    <rect x="230" y="30" width="5" height="3" rx="1" fill="#fbbf24" transform="rotate(-30,232,31)"/>
    <circle cx="50" cy="70" r="3" fill="#a78bfa"/>
    <circle cx="270" cy="65" r="3" fill="#fb7185"/>
    <circle cx="160" cy="20" r="3.5" fill="#00c896"/>
    <rect x="120" y="25" width="7" height="3" rx="1" fill="#fbbf24" transform="rotate(60,123,26)"/>
    <rect x="200" y="20" width="7" height="3" rx="1" fill="#fb7185" transform="rotate(-45,203,21)"/>
  </g>
</svg>

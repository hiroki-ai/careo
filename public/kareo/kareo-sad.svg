<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#3b4f6b"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff5ef"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="65%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#00e8b8"/>
      <stop offset="100%" stop-color="#009e76"/>
    </linearGradient>
    <linearGradient id="beakG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <ellipse cx="160" cy="374" rx="80" ry="10" fill="rgba(0,0,0,0.10)"/>

  <!-- Body -->
  <ellipse cx="160" cy="258" rx="90" ry="100" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="270" rx="57" ry="78" fill="url(#bellyG)"/>

  <!-- Wings (drooping down) -->
  <ellipse cx="74" cy="270" rx="24" ry="72" fill="url(#bodyG)" transform="rotate(-5,74,270)"/>
  <ellipse cx="246" cy="270" rx="24" ry="72" fill="url(#bodyG)" transform="rotate(5,246,270)"/>

  <!-- Feet -->
  <ellipse cx="130" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(-22,130,352)"/>
  <ellipse cx="190" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(22,190,352)"/>

  <!-- Tie -->
  <path d="M152,187 L160,174 L168,187 L160,185Z" fill="#007f5e"/>
  <path d="M153,187 L167,187 L163,232 L160,238 L157,232Z" fill="url(#tieG)"/>

  <!-- Head -->
  <circle cx="160" cy="135" r="84" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="146" rx="56" ry="53" fill="url(#bellyG)"/>

  <!-- Droopy eyes -->
  <circle cx="140" cy="130" r="20" fill="white"/>
  <circle cx="180" cy="130" r="20" fill="white"/>
  <!-- Droopy eyelids -->
  <path d="M120,122 Q140,130 160,122" fill="url(#bodyG)"/>
  <path d="M160,122 Q180,130 200,122" fill="url(#bodyG)"/>
  <!-- Irises (looking down) -->
  <circle cx="142" cy="135" r="11" fill="url(#eyeG)"/>
  <circle cx="182" cy="135" r="11" fill="url(#eyeG)"/>
  <circle cx="143" cy="136" r="6.5" fill="#020617"/>
  <circle cx="183" cy="136" r="6.5" fill="#020617"/>
  <!-- Small sparkles (dimmer) -->
  <circle cx="147" cy="131" r="3.5" fill="white" opacity="0.7"/>
  <circle cx="187" cy="131" r="3.5" fill="white" opacity="0.7"/>

  <!-- Sad eyebrows -->
  <path d="M125,112 Q135,118 150,114" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M170,114 Q185,118 195,112" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tear drop -->
  <ellipse cx="200" cy="148" rx="4" ry="7" fill="rgba(100,180,255,0.5)"/>
  <circle cx="200" cy="144" r="3.5" fill="rgba(130,200,255,0.6)"/>

  <!-- Beak (frown) -->
  <path d="M146,160 Q160,168 174,160 Q160,152 146,160Z" fill="url(#beakG)"/>
  <path d="M150,163 Q160,157 170,163" stroke="#b45309" stroke-width="1.5" fill="none"/>

  <!-- Cheeks (subdued) -->
  <ellipse cx="116" cy="156" rx="16" ry="10" fill="rgba(255,130,130,0.15)"/>
  <ellipse cx="204" cy="156" rx="16" ry="10" fill="rgba(255,130,130,0.15)"/>
</svg>

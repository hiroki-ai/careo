<svg width="320" height="380" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#3b4f6b"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff5ef"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="65%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#00e8b8"/>
      <stop offset="100%" stop-color="#009e76"/>
    </linearGradient>
    <linearGradient id="beakG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <ellipse cx="160" cy="374" rx="80" ry="10" fill="rgba(0,0,0,0.10)"/>

  <!-- Body -->
  <ellipse cx="160" cy="258" rx="90" ry="100" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="270" rx="57" ry="78" fill="url(#bellyG)"/>

  <!-- Left wing (normal) -->
  <ellipse cx="74" cy="250" rx="26" ry="72" fill="url(#bodyG)" transform="rotate(-15,74,250)"/>

  <!-- Right wing (raised, pointing up / thumbs up) -->
  <ellipse cx="256" cy="200" rx="24" ry="60" fill="url(#bodyG)" transform="rotate(30,256,200)"/>
  <!-- Thumb up circle -->
  <circle cx="280" cy="165" r="12" fill="url(#bodyG)"/>
  <circle cx="280" cy="165" r="8" fill="url(#bellyG)"/>
  <!-- Thumb line -->
  <path d="M276,165 L284,158" stroke="#0d1b2e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Feet -->
  <ellipse cx="130" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(-22,130,352)"/>
  <ellipse cx="190" cy="352" rx="30" ry="11" fill="url(#beakG)" transform="rotate(22,190,352)"/>

  <!-- Tie -->
  <path d="M152,187 L160,174 L168,187 L160,185Z" fill="#007f5e"/>
  <path d="M153,187 L167,187 L163,232 L160,238 L157,232Z" fill="url(#tieG)"/>

  <!-- Head -->
  <circle cx="160" cy="135" r="84" fill="url(#bodyG)" filter="url(#softShadow)"/>
  <ellipse cx="160" cy="146" rx="56" ry="53" fill="url(#bellyG)"/>

  <!-- Left eye (winking - closed arc) -->
  <path d="M125,128 Q140,118 155,128" stroke="#0d1b2e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Right eye (open, confident) -->
  <circle cx="180" cy="128" r="20" fill="white"/>
  <circle cx="182" cy="129" r="12" fill="url(#eyeG)"/>
  <circle cx="183" cy="130" r="7" fill="#020617"/>
  <circle cx="188" cy="124" r="4.2" fill="white"/>
  <circle cx="179" cy="134" r="2.2" fill="rgba(255,255,255,0.65)"/>

  <!-- Eyelashes -->
  <path d="M166,112 Q170,105 176,108" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M194,115 Q198,108 202,111" stroke="#0d1b2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Beak (confident smile) -->
  <path d="M144,158 Q160,175 176,158 Q160,150 144,158Z" fill="url(#beakG)"/>
  <path d="M150,160 Q160,168 170,160" stroke="#b45309" stroke-width="1.3" fill="none"/>

  <!-- Cheeks (warm) -->
  <ellipse cx="116" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.28)"/>
  <ellipse cx="204" cy="156" rx="18" ry="12" fill="rgba(255,130,130,0.28)"/>

  <!-- Sparkle near thumb -->
  <g transform="translate(296,148)" opacity="0.85">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#00c896" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#00c896" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#00c896"/>
  </g>
  <g transform="translate(55,90)" opacity="0.6">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#00c896" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#00c896" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>

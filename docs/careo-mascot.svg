  <!-- Body -->
  <ellipse cx="120" cy="192" rx="66" ry="76" fill="#1e293b"/>

  <!-- White belly -->
  <ellipse cx="120" cy="200" rx="40" ry="58" fill="#f8fafc"/>

  <!-- Left wing -->
  <ellipse cx="57" cy="190" rx="19" ry="58" fill="#1e293b" transform="rotate(-10, 57, 190)"/>
  <!-- Right wing -->
  <ellipse cx="183" cy="190" rx="19" ry="58" fill="#1e293b" transform="rotate(10, 183, 190)"/>

  <!-- Left foot -->
  <ellipse cx="100" cy="263" rx="22" ry="8" fill="#f59e0b" transform="rotate(-18, 100, 263)"/>
  <!-- Right foot -->
  <ellipse cx="140" cy="263" rx="22" ry="8" fill="#f59e0b" transform="rotate(18, 140, 263)"/>

  <!-- Head -->

  <!-- Left eye white -->
  <circle cx="106" cy="86" r="11" fill="#f8fafc"/>
  <!-- Right eye white -->
  <circle cx="134" cy="86" r="11" fill="#f8fafc"/>

  <!-- Left pupil -->

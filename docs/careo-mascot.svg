  <!-- Right pupil -->
  <circle cx="136" cy="86" r="6.5" fill="#1e293b"/>

  <!-- Left eye shine -->
  <circle cx="111" cy="83" r="2.5" fill="white"/>
  <!-- Right eye shine -->
  <circle cx="139" cy="83" r="2.5" fill="white"/>

  <!-- Beak -->
